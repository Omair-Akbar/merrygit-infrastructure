apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: merrygit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: merrygit-chat:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"
            - name: USERSERVICE
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: USERSERVICE
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: FRONTEND_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: JWT_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: CLOUDINARY_API_SECRET