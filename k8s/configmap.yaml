apiVersion: v1
kind: ConfigMap
metadata:
  name: merrygit-config
  namespace: merrygit
data:
  # Frontend
  NEXT_PUBLIC_USER_API_BASE_URL: "http://user-service:5000/api/v1"
  NEXT_PUBLIC_CHAT_API_BASE_URL: "http://chat-service:5002/api/v1/chat"
  NEXT_PUBLIC_SOCKET_URL: "http://chat-service:5002/"
  NEXT_PUBLIC_GITHUB_REPO_URL: "https://github.com/Omair-Akbar/merrygit"
  NEXT_PUBLIC_GITHUB_API_URL: "https://api.github.com/repositories/1116313496"

  # Chat Service
  USERSERVICE: "http://user-service:5000"
  FRONTEND_URL: "http://frontend-service:3000"

  # User Service
  PORT_USER: "5000"
  PORT_CHAT: "5002"
  NODE_ENV: "development"
  REDIS_PORT: "11304"

  # Mail Service
  APP_NAME: "OTP Mail Service"
  APP_VERSION: "1.0.0"
  PORT_MAIL: "8000"
  HOST: "0.0.0.0"
  LOG_LEVEL: "INFO"
  RABBITMQ_RECONNECT_ATTEMPTS: "5"
  RABBITMQ_RECONNECT_DELAY: "5"
  RABBITMQ_RECONNECT_MAX_DELAY: "30"
  RESEND_FROM_EMAIL: "info@merrygit.tech"
  RESEND_FROM_NAME: "MerryGit"
  EMAIL_TIMEOUT: "30"