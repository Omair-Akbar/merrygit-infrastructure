apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-service
  namespace: merrygit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-service
  template:
    metadata:
      labels:
        app: mail-service
    spec:
      containers:
        - name: mail-service
          image: merrygit-mail:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: APP_VERSION
            - name: PORT
              value: "8000"
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: HOST
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: LOG_LEVEL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: RABBITMQ_URL
            - name: RABBITMQ_RECONNECT_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: RABBITMQ_RECONNECT_ATTEMPTS
            - name: RABBITMQ_RECONNECT_DELAY
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: RABBITMQ_RECONNECT_DELAY
            - name: RABBITMQ_RECONNECT_MAX_DELAY
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: RABBITMQ_RECONNECT_MAX_DELAY
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: merrygit-secret
                  key: RESEND_API_KEY
            - name: RESEND_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: RESEND_FROM_EMAIL
            - name: RESEND_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: RESEND_FROM_NAME
            - name: EMAIL_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: merrygit-config
                  key: EMAIL_TIMEOUT